apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmyshow-deployment
  labels:
    app: bookmyshow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bookmyshow

  template:
    metadata:
      labels:
        app: bookmyshow

    spec:
      containers:
      - name: bookmyshow-container
        image: amith1808/bookmyshow:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
