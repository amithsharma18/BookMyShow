---
# This role pulls the latest app image (built and pushed by Jenkins) and runs it.
# In a manual run (before Jenkins is wired up), it builds the image locally instead.

- name: Check if app image exists locally
  command: docker images -q {{ docker_image }}
  register: image_check
  changed_when: false

- name: Stop and remove old container if running
  docker_container:
    name: bms-app
    state: absent
  ignore_errors: yes

- name: Run the BookMyShow app container
  docker_container:
    name: bms-app
    image: "{{ docker_image }}"
    state: started
    restart_policy: always
    ports:
      - "3000:3000"
