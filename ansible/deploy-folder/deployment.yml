apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmyshow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookmyshow
  template:
    metadata:
      labels:
        app: bookmyshow
    spec:
      containers:
      - name: bookmyshow
        image: amith1808/bookmyshow:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
