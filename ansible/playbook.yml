---
- name: Configure DevOps box - install Docker and Jenkins
  hosts: devops_box
  become: yes
  gather_facts: yes

  roles:
    - docker
    - jenkins

- name: Deploy the BookMyShow app container
  hosts: devops_box
  become: yes
  gather_facts: no
  vars:
    docker_image: "YOUR_DOCKERHUB_USERNAME/bms:latest"

  roles:
    - app
